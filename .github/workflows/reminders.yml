name: Email reminders

on:
  schedule:
    # Every 5 minutes, offset by 1 (fires at :01, :06, :11 … :31 …). The offset
    # catches on-the-hour and half-hour reminders ~1 min after they're due and
    # dodges the top-of-hour congestion. Also keeps the Supabase project awake.
    - cron: '1-59/5 * * * *'
  workflow_dispatch: {} # allow manual runs (for testing)

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/send-reminders.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REMINDER_FROM: ${{ secrets.REMINDER_FROM }}
          REMINDER_TZ: ${{ secrets.REMINDER_TZ }}
