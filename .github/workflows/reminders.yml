name: Reminders (email + push)

on:
  # The primary reminder scheduler is now a Cloudflare Worker Cron Trigger (runs
  # every minute — punctual, unlike GitHub's scheduled runners which lagged
  # 15-30 min under load). This workflow is kept as a manual backup only: run it
  # from the Actions tab if the Cloudflare cron is ever down. The `sent_at` stamp
  # makes it safe to run alongside the Worker without double-sending.
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # web-push is only needed by the sender (Web Push encryption + VAPID).
      - run: npm install web-push@^3 --no-save --no-audit --no-fund
      - run: node scripts/send-reminders.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REMINDER_FROM: ${{ secrets.REMINDER_FROM }}
          REMINDER_TZ: ${{ secrets.REMINDER_TZ }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
